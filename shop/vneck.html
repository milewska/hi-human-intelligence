<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HI V-Neck Women's Tee — HI Human Intelligence</title>
  <meta name="description" content="Women's v-neck tee. A reminder to trust the innate intelligence of the human body.">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <!-- Nav -->
  <nav class="nav">
    <a href="../index.html" class="nav-logo">
      <img src="../Logo/2.png" alt="HI — Human Intelligence">
    </a>
    <button class="menu-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="../about.html">About</a></li>
      <li><a href="../shop.html" class="active">Shop</a></li>
    </ul>
  </nav>

  <!-- Product Detail -->
  <section class="product-detail">
    <div class="product-detail-image">
      <img src="../images/photo-09.jpg" alt="HI V-Neck Women's Tee" id="product-image">
    </div>

    <div class="product-detail-info">
      <h1>HI V-Neck Women's Tee</h1>
      <p class="product-price">$30</p>
      <p class="product-desc">Women's v-neck tee. A reminder to trust the innate intelligence of the human body.</p>

      <form id="product-form" class="product-options">
        <!-- Color -->
        <div class="option-group">
          <label>Shirt Color</label>
          <div class="option-buttons" id="color-options"></div>
        </div>

        <!-- Size -->
        <div class="option-group">
          <label>Size</label>
          <div class="option-buttons" id="size-options"></div>
        </div>

        <!-- Print Color -->
        <div class="option-group">
          <label>Print Color</label>
          <div class="option-buttons" id="print-options"></div>
        </div>

        <!-- Stock status -->
        <div id="stock-status" class="stock-status"></div>

        <!-- Buy Button -->
        <button type="submit" class="cta cta-warm product-buy" id="buy-btn" disabled>
          Select Options Above
        </button>
      </form>

      <a href="../shop.html" class="back-link">← Back to Shop</a>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <a href="../index.html" class="footer-logo">
      <img src="../images/logo-1.png" alt="HI">
    </a>
    <p class="tagline">A reminder to trust the innate intelligence of the human body.</p>
    <div class="footer-socials">
      <a href="#">Instagram</a>
      <a href="#">TikTok</a>
    </div>
    <p class="footer-copy">&copy; 2026 HI — Human Intelligence. All rights reserved.</p>
  </footer>

  <script>
    // ─── Variant Data (from Stripe) ───
    const VARIANTS = [
      { color: "Asphalt",        size: "S", print: "w", qty: 2, productId: "prod_U4dGcsOlhca8TC", priceId: "price_1T6U08E3DWgyVvjlro5XMWzj" },
      { color: "Asphalt",        size: "M", print: "w", qty: 3, productId: "prod_U4dGUBGcDI2wZq", priceId: "price_1T6U0AE3DWgyVvjl1jcGcCFe" },
      { color: "Asphalt",        size: "L", print: "w", qty: 4, productId: "prod_U4dG3Sz25IjNFp", priceId: "price_1T6U0BE3DWgyVvjlZNwYS1sH" },
      { color: "Natural",        size: "S", print: "w", qty: 2, productId: "prod_U4dGem9eVA78JR", priceId: "price_1T6U0CE3DWgyVvjlJJvFdUrf" },
      { color: "Natural",        size: "M", print: "d", qty: 2, productId: "prod_U4dGrf0bcsxhpA", priceId: "price_1T6U0DE3DWgyVvjlridXov9H" },
      { color: "Natural",        size: "L", print: "d", qty: 3, productId: "prod_U4dGe9EBdK9r5t", priceId: "price_1T6U0FE3DWgyVvjlVFiNISO1" },
      { color: "Natural",        size: "L", print: "w", qty: 3, productId: "prod_U4dG7HkveRJmVL", priceId: "price_1T6U0GE3DWgyVvjlBfikVWqa" },
      { color: "Mauve",          size: "S", print: "w", qty: 2, productId: "prod_U4dGeKr7sVujOp", priceId: "price_1T6U0HE3DWgyVvjl8Cui06Mu" },
      { color: "Mauve",          size: "M", print: "w", qty: 2, productId: "prod_U4dG1NipS4fXTJ", priceId: "price_1T6U0IE3DWgyVvjl6xpU7LE0" },
      { color: "Mauve",          size: "L", print: "w", qty: 4, productId: "prod_U4dGYvmVcjCEfe", priceId: "price_1T6U0KE3DWgyVvjlAvVqGQ3n" },
      { color: "Military Green", size: "S", print: "d", qty: 2, productId: "prod_U4dGEC7f9EOOMM", priceId: "price_1T6U0LE3DWgyVvjls1XGrslL" },
      { color: "Military Green", size: "S", print: "w", qty: 1, productId: "prod_U4dGjbP6MzKID8", priceId: "price_1T6U0ME3DWgyVvjlsChM97JD" },
      { color: "Military Green", size: "M", print: "d", qty: 1, productId: "prod_U4dGvbNpujB0Qt", priceId: "price_1T6U0NE3DWgyVvjlSuIr8LYp" },
      { color: "Military Green", size: "L", print: "w", qty: 1, productId: "prod_U4dGIOfP3BRVin", priceId: "price_1T6U0PE3DWgyVvjl75YzBhe9" },
      { color: "Military Green", size: "L", print: "d", qty: 1, productId: "prod_U4dGFpjrH9GSPV", priceId: "price_1T6U0QE3DWgyVvjlvvgUQ97c" },
    ];

    // ─── State ───
    let selectedColor = null;
    let selectedSize = null;
    let selectedPrint = null;

    const colorContainer = document.getElementById('color-options');
    const sizeContainer = document.getElementById('size-options');
    const printContainer = document.getElementById('print-options');
    const buyBtn = document.getElementById('buy-btn');
    const stockStatus = document.getElementById('stock-status');
    const productForm = document.getElementById('product-form');

    const PRINT_LABELS = { d: 'Dark', w: 'White' };

    // Get unique values
    const allColors = [...new Set(VARIANTS.map(v => v.color))];

    function render() {
      // ── Colors ──
      colorContainer.innerHTML = '';
      allColors.forEach(color => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'opt-btn' + (selectedColor === color ? ' active' : '');
        btn.textContent = color;
        btn.addEventListener('click', () => {
          selectedColor = color;
          selectedSize = null;
          selectedPrint = null;
          render();
        });
        colorContainer.appendChild(btn);
      });

      // ── Sizes (filtered by color) ──
      sizeContainer.innerHTML = '';
      if (selectedColor) {
        const colorVariants = VARIANTS.filter(v => v.color === selectedColor);
        const sizes = [...new Set(colorVariants.map(v => v.size))];
        const sizeOrder = ['S', 'M', 'L', 'XL', '2XL'];
        sizes.sort((a, b) => sizeOrder.indexOf(a) - sizeOrder.indexOf(b));

        sizes.forEach(size => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'opt-btn' + (selectedSize === size ? ' active' : '');
          btn.textContent = size;
          btn.addEventListener('click', () => {
            selectedSize = size;
            selectedPrint = null;
            render();
          });
          sizeContainer.appendChild(btn);
        });
      }

      // ── Print (filtered by color + size) ──
      printContainer.innerHTML = '';
      if (selectedColor && selectedSize) {
        const filtered = VARIANTS.filter(v => v.color === selectedColor && v.size === selectedSize);
        const prints = [...new Set(filtered.map(v => v.print))];

        if (prints.length === 1) {
          // Auto-select if only one option
          selectedPrint = prints[0];
        }

        prints.forEach(print => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'opt-btn' + (selectedPrint === print ? ' active' : '');
          btn.textContent = PRINT_LABELS[print] || print;
          btn.addEventListener('click', () => {
            selectedPrint = print;
            render();
          });
          printContainer.appendChild(btn);
        });
      }

      // ── Buy button + stock ──
      const variant = getSelectedVariant();
      if (variant) {
        if (variant.qty > 0) {
          buyBtn.disabled = false;
          buyBtn.textContent = 'Buy Now — $30';
          stockStatus.textContent = variant.qty <= 3 ? `Only ${variant.qty} left` : 'In Stock';
          stockStatus.className = 'stock-status' + (variant.qty <= 3 ? ' stock-low' : ' stock-ok');
        } else {
          buyBtn.disabled = true;
          buyBtn.textContent = 'Sold Out';
          stockStatus.textContent = 'Out of stock';
          stockStatus.className = 'stock-status stock-out';
        }
      } else {
        buyBtn.disabled = true;
        buyBtn.textContent = 'Select Options Above';
        stockStatus.textContent = '';
        stockStatus.className = 'stock-status';
      }
    }

    function getSelectedVariant() {
      if (!selectedColor || !selectedSize || !selectedPrint) return null;
      return VARIANTS.find(v =>
        v.color === selectedColor &&
        v.size === selectedSize &&
        v.print === selectedPrint
      );
    }

    // ── Checkout ──
    productForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const variant = getSelectedVariant();
      if (!variant) return;

      buyBtn.disabled = true;
      buyBtn.textContent = 'Processing...';

      try {
        const res = await fetch('/api/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            priceId: variant.priceId,
            productId: variant.productId,
            quantity: 1
          })
        });

        const data = await res.json();

        if (data.url) {
          window.location.href = data.url;
        } else if (data.error === 'out_of_stock') {
          stockStatus.textContent = data.message;
          stockStatus.className = 'stock-status stock-out';
          buyBtn.textContent = 'Sold Out';
        } else {
          alert('Something went wrong. Please try again.');
          render();
        }
      } catch (err) {
        alert('Connection error. Please try again.');
        render();
      }
    });

    // ── Init ──
    render();

    // ── Nav toggle ──
    const toggle = document.querySelector('.menu-toggle');
    const navLinks = document.querySelector('.nav-links');
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      navLinks.classList.toggle('open');
    });
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        toggle.classList.remove('open');
        navLinks.classList.remove('open');
      });
    });
  </script>

</body>
</html>
