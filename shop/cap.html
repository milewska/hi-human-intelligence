<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HI Cap — HI Human Intelligence</title>
  <meta name="description" content="Classic cap with embroidered HI logo. A reminder to trust the innate intelligence of the human body.">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <section class="product-detail">
    <div class="product-detail-image">
      <img src="../images/photo-03.jpg" alt="HI Cap" id="product-image">
    </div>
    <div class="product-detail-info">
      <h1>HI Cap</h1>
      <p class="product-price">$35</p>
      <p class="product-desc">Classic cap with embroidered HI logo. A reminder to trust the innate intelligence of the human body.</p>

      <form id="product-form" class="product-options">
        <div class="option-group">
          <label for="color-select">Color</label>
          <select class="option-select" id="color-select">
            <option value="">Select a color</option>
          </select>
        </div>
        <div id="stock-status" class="stock-status"></div>
        <button type="submit" class="cta cta-warm product-buy" id="buy-btn" disabled>
          Select a Color
        </button>
      </form>

      <a href="../shop.html" class="back-link">← Back to Shop</a>
    </div>
  </section>

  <script src="../nav.js" defer></script>
  <script src="../footer.js" defer></script>
  <script src="../cart.js" defer></script>

  <script>
    const VARIANTS = [
      { color: "Black",     qty: 3, productId: "prod_U4dHkHV7cJS24a", priceId: "price_1T6U0dE3DWgyVvjlbXhuf6HG" },
      { color: "Charcoal",  qty: 3, productId: "prod_U4dHQfZf8lC4dv", priceId: "price_1T6U0fE3DWgyVvjlNxiz9D3d" },
      { color: "Driftwood", qty: 0, productId: "prod_U4dHILhJpFyPMb", priceId: "price_1T6U0gE3DWgyVvjlLCWIfD4s" },
      { color: "Stone",     qty: 4, productId: "prod_U4dHxXOmD3yDku", priceId: "price_1T6U0hE3DWgyVvjlPdVaFqbc" },
    ];

    // Image map: color → filename
    const IMAGE_MAP = {
      'Black':     '../images/shop/hatBlack.JPG',
      'Charcoal':  '../images/shop/hatCharcoal.JPG',
      'Driftwood': '../images/shop/hatDriftwood.JPG',
      'Stone':     '../images/shop/hatStone.jpg',
    };
    const DEFAULT_IMAGE = '../images/photo-03.jpg';

    let selectedColor = null;
    const colorSelect = document.getElementById('color-select');
    const buyBtn = document.getElementById('buy-btn');
    const stockStatus = document.getElementById('stock-status');
    const productForm = document.getElementById('product-form');
    const productImage = document.getElementById('product-image');

    VARIANTS.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.color;
      opt.textContent = v.qty === 0 ? `${v.color} (Sold Out)` : v.color;
      if (v.qty === 0) opt.disabled = true;
      colorSelect.appendChild(opt);
    });

    colorSelect.addEventListener('change', () => {
      selectedColor = colorSelect.value || null;
      productImage.src = IMAGE_MAP[selectedColor] || DEFAULT_IMAGE;
      updateStatus();
    });

    function updateStatus() {
      const variant = selectedColor ? VARIANTS.find(v => v.color === selectedColor) : null;
      if (variant) {
        if (variant.qty > 0) {
          buyBtn.disabled = false; buyBtn.textContent = 'Add to Cart — $35';
          stockStatus.textContent = variant.qty <= 3 ? `Only ${variant.qty} left` : 'In Stock';
          stockStatus.className = 'stock-status' + (variant.qty <= 3 ? ' stock-low' : ' stock-ok');
        } else {
          buyBtn.disabled = true; buyBtn.textContent = 'Sold Out';
          stockStatus.textContent = 'Out of stock'; stockStatus.className = 'stock-status stock-out';
        }
      } else {
        buyBtn.disabled = true; buyBtn.textContent = 'Select a Color';
        stockStatus.textContent = ''; stockStatus.className = 'stock-status';
      }
    }

    productForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const variant = VARIANTS.find(v => v.color === selectedColor);
      if (!variant) return;
      const image = IMAGE_MAP[selectedColor] || DEFAULT_IMAGE;
      HI_CART.add({
        priceId: variant.priceId,
        productId: variant.productId,
        name: 'HI Cap',
        color: variant.color,
        size: null,
        print: null,
        price: 35,
        qty: 1,
        image: image.replace('../', ''),
      });
      buyBtn.textContent = '✓ Added!';
      buyBtn.disabled = true;
      setTimeout(() => updateStatus(), 1500);
    });
  </script>
</body>
</html>
