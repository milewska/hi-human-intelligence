<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HI Long Sleeve — HI Human Intelligence</title>
  <meta name="description" content="Long sleeve tee. A reminder to trust the innate intelligence of the human body.">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <section class="product-detail">
    <div class="product-detail-image">
      <img src="../images/photo-09.jpg" alt="HI Long Sleeve" id="product-image">
    </div>
    <div class="product-detail-info">
      <h1>HI Long Sleeve</h1>
      <p class="product-price">$55</p>
      <p class="product-desc">Long sleeve tee. A reminder to trust the innate intelligence of the human body.</p>

      <form id="product-form" class="product-options">
        <div class="option-group">
          <label for="color-select">Shirt Color</label>
          <select class="option-select" id="color-select">
            <option value="">Select a color</option>
          </select>
        </div>
        <div class="option-group">
          <label for="size-select">Size</label>
          <select class="option-select" id="size-select" disabled>
            <option value="">Select a size</option>
          </select>
        </div>
        <div class="option-group">
          <label for="print-select">Print Color</label>
          <select class="option-select" id="print-select" disabled>
            <option value="">Select print color</option>
          </select>
        </div>
        <div id="stock-status" class="stock-status"></div>
        <button type="submit" class="cta cta-warm product-buy" id="buy-btn" disabled>
          Select Options Above
        </button>
      </form>

      <a href="../shop.html" class="back-link">← Back to Shop</a>
    </div>
  </section>

  <script src="../nav.js" defer></script>
  <script src="../footer.js" defer></script>

  <script>
    const VARIANTS = [
      { color: "Denim",       size: "M", print: "w", qty: 1, productId: "prod_U4dGsn6wq0sMlF", priceId: "price_1T6U0RE3DWgyVvjlvJWD5nOX" },
      { color: "Denim",       size: "L", print: "w", qty: 1, productId: "prod_U4dHvw1fkWZ5Kh", priceId: "price_1T6U0SE3DWgyVvjltP70kUu7" },
      { color: "Crimson",     size: "S", print: "d", qty: 1, productId: "prod_U4dHaqrLmxOdVv", priceId: "price_1T6U0VE3DWgyVvjl2PKfQP3G" },
      { color: "Crimson",     size: "M", print: "d", qty: 1, productId: "prod_U4dHYUXdrjEmg1", priceId: "price_1T6U0WE3DWgyVvjlUNYDu2cX" },
      { color: "Crimson",     size: "L", print: "d", qty: 1, productId: "prod_U4dHoIQHKkwyPm", priceId: "price_1T6U0XE3DWgyVvjlZQN9nQvR" },
      { color: "Light Green", size: "S", print: "w", qty: 2, productId: "prod_U4dHR3SLTMFc61", priceId: "price_1T6U0YE3DWgyVvjlwGdrWCEO" },
      { color: "Ivory",       size: "S", print: "d", qty: 1, productId: "prod_U4dHguKpxRQqix", priceId: "price_1T6U0aE3DWgyVvjlPriaQlq3" },
      { color: "Ivory",       size: "M", print: "d", qty: 1, productId: "prod_U4dHacNtljhxnq", priceId: "price_1T6U0bE3DWgyVvjlBgRAOsYS" },
      { color: "Ivory",       size: "L", print: "d", qty: 1, productId: "prod_U4dHfskb0GdQRV", priceId: "price_1T6U0cE3DWgyVvjl6TdHHvLd" },
    ];

    const PRICE_DISPLAY = '$55';

    const colorSelect = document.getElementById('color-select');
    const sizeSelect = document.getElementById('size-select');
    const printSelect = document.getElementById('print-select');
    const buyBtn = document.getElementById('buy-btn');
    const stockStatus = document.getElementById('stock-status');
    const productForm = document.getElementById('product-form');
    const PRINT_LABELS = { d: 'Dark', w: 'White' };
    const allColors = [...new Set(VARIANTS.map(v => v.color))];

    allColors.forEach(color => {
      const opt = document.createElement('option');
      opt.value = color; opt.textContent = color;
      colorSelect.appendChild(opt);
    });

    colorSelect.addEventListener('change', () => {
      sizeSelect.value = ''; printSelect.value = ''; printSelect.disabled = true;
      updateSizes(); updateStatus();
    });
    sizeSelect.addEventListener('change', () => {
      printSelect.value = ''; updatePrints(); updateStatus();
    });
    printSelect.addEventListener('change', () => { updateStatus(); });

    function updateSizes() {
      const color = colorSelect.value;
      sizeSelect.innerHTML = '<option value="">Select a size</option>';
      if (!color) { sizeSelect.disabled = true; return; }
      const sizes = [...new Set(VARIANTS.filter(v => v.color === color).map(v => v.size))];
      const order = ['S', 'M', 'L', 'XL', '2XL'];
      sizes.sort((a, b) => order.indexOf(a) - order.indexOf(b));
      sizes.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        sizeSelect.appendChild(opt);
      });
      sizeSelect.disabled = false;
    }

    function updatePrints() {
      const color = colorSelect.value, size = sizeSelect.value;
      printSelect.innerHTML = '<option value="">Select print color</option>';
      if (!color || !size) { printSelect.disabled = true; return; }
      const prints = [...new Set(VARIANTS.filter(v => v.color === color && v.size === size).map(v => v.print))];
      if (prints.length === 1) {
        const opt = document.createElement('option');
        opt.value = prints[0]; opt.textContent = PRINT_LABELS[prints[0]] || prints[0];
        printSelect.appendChild(opt);
        printSelect.value = prints[0];
      } else {
        prints.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p; opt.textContent = PRINT_LABELS[p] || p;
          printSelect.appendChild(opt);
        });
      }
      printSelect.disabled = false;
      updateStatus();
    }

    function getSelectedVariant() {
      const color = colorSelect.value, size = sizeSelect.value, print = printSelect.value;
      if (!color || !size || !print) return null;
      return VARIANTS.find(v => v.color === color && v.size === size && v.print === print);
    }

    function updateStatus() {
      const variant = getSelectedVariant();
      if (variant) {
        if (variant.qty > 0) {
          buyBtn.disabled = false; buyBtn.textContent = `Buy Now — ${PRICE_DISPLAY}`;
          stockStatus.textContent = variant.qty <= 3 ? `Only ${variant.qty} left` : 'In Stock';
          stockStatus.className = 'stock-status' + (variant.qty <= 3 ? ' stock-low' : ' stock-ok');
        } else {
          buyBtn.disabled = true; buyBtn.textContent = 'Sold Out';
          stockStatus.textContent = 'Out of stock'; stockStatus.className = 'stock-status stock-out';
        }
      } else {
        buyBtn.disabled = true; buyBtn.textContent = 'Select Options Above';
        stockStatus.textContent = ''; stockStatus.className = 'stock-status';
      }
    }

    productForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const variant = getSelectedVariant();
      if (!variant) return;
      buyBtn.disabled = true; buyBtn.textContent = 'Processing...';
      try {
        const res = await fetch('/api/checkout', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ priceId: variant.priceId, productId: variant.productId, quantity: 1 })
        });
        const data = await res.json();
        if (data.url) window.location.href = data.url;
        else if (data.error === 'out_of_stock') {
          stockStatus.textContent = data.message; stockStatus.className = 'stock-status stock-out'; buyBtn.textContent = 'Sold Out';
        } else { alert('Something went wrong.'); updateStatus(); }
      } catch { alert('Connection error.'); updateStatus(); }
    });
  </script>
</body>
</html>
