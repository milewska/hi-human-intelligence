<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HI Classic Tee — HI Human Intelligence</title>
  <meta name="description" content="Classic fit tee. A reminder to trust the innate intelligence of the human body.">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <!-- Product Detail -->
  <section class="product-detail">
    <div class="product-detail-image">
      <img src="../images/photo-12.jpg" alt="HI Classic Tee" id="product-image">
    </div>

    <div class="product-detail-info">
      <h1>HI Classic Tee</h1>
      <p class="product-price">$45</p>
      <p class="product-desc">Classic fit tee. A reminder to trust the innate intelligence of the human body.</p>

      <div id="discount-notice" class="discount-notice" style="display:none">
        <p><strong>25% OFF</strong> — <s>$45</s> <span class="discount-price">$35</span></p>
        <p class="discount-disclaimer">Print colors have bled and logos may be a bit washed out.</p>
      </div>

      <form id="product-form" class="product-options">
        <div class="option-group">
          <label for="color-select">Shirt Color</label>
          <select class="option-select" id="color-select">
            <option value="">Select a color</option>
          </select>
        </div>
        <div class="option-group">
          <label>Size</label>
          <div class="option-buttons" id="size-buttons"></div>
        </div>
        <div class="option-group">
          <label>Print Color</label>
          <div class="option-buttons" id="print-buttons"></div>
        </div>
        <div id="stock-status" class="stock-status"></div>
        <button type="submit" class="cta cta-warm product-buy" id="buy-btn" disabled>
          Select Options Above
        </button>
      </form>

      <a href="../cart.html" class="cta checkout-btn" id="checkout-btn" style="display:none">Checkout</a>

      <a href="../shop.html" class="back-link">← Back to Shop</a>
    </div>
  </section>

  <script src="../nav.js" defer></script>
  <script src="../footer.js" defer></script>
  <script src="../cart.js" defer></script>

  <script>
    const VARIANTS = [
      // Washed Pine
      { color: "Washed Pine", size: "M",   print: "d", qty: 2, productId: "prod_U4dGrecC1attgM", priceId: "price_1T6TziE3DWgyVvjlaCZoTZHi" },
      { color: "Washed Pine", size: "L",   print: "w", qty: 1, productId: "prod_U4dGbCsYVg5pBC", priceId: "price_1T6TzjE3DWgyVvjlg9E5Bcsu" },
      { color: "Washed Pine", size: "XL",  print: "d", qty: 1, productId: "prod_U4dGtDVZhfJ5aD", priceId: "price_1T6TzkE3DWgyVvjlAt0nhJqi" },
      { color: "Washed Pine", size: "2XL", print: "w", qty: 1, productId: "prod_U4dG5EeXK2fQby", priceId: "price_1T6TzmE3DWgyVvjlHCsxFEPg" },
      // Washed Red
      { color: "Washed Red", size: "L",   print: "d", qty: 1, productId: "prod_U4dGqoyUiJyyTQ", priceId: "price_1T6pabE3DWgyVvjlOEXaGqsx" },
      { color: "Washed Red", size: "L",   print: "w", qty: 1, productId: "prod_U4dGGBwydZpTxq", priceId: "price_1T6pahE3DWgyVvjlaoIp66S3" },
      { color: "Washed Red", size: "XL",  print: "d", qty: 2, productId: "prod_U4dG9I1CS7aH7t", priceId: "price_1T6pamE3DWgyVvjlGftGWsnJ" },
      { color: "Washed Red", size: "XL",  print: "w", qty: 1, productId: "prod_U4dGdox5G1Su8o", priceId: "price_1T6paqE3DWgyVvjlV5q8tZBB" },
      { color: "Washed Red", size: "2XL", print: "d", qty: 1, productId: "prod_U4dGA3MkrOHfJH", priceId: "price_1T6pavE3DWgyVvjlKRwUp1B0" },
      // Washed Cocoa
      { color: "Washed Cocoa", size: "XL",  print: "w", qty: 3, productId: "prod_U4dGURjsgRSgrE", priceId: "price_1T6paME3DWgyVvjlJWDJWJ2U" },
      { color: "Washed Cocoa", size: "2XL", print: "w", qty: 1, productId: "prod_U4dGFNuhwBjcSM", priceId: "price_1T6pb3E3DWgyVvjlbNd91tt6" },
      // Brick
      { color: "Brick", size: "S", print: "w", qty: 4, productId: "prod_U4dGDSLZ4Ix9Xf", priceId: "price_1T6TzxE3DWgyVvjlDCQE4oFk" },
      { color: "Brick", size: "M", print: "w", qty: 2, productId: "prod_U4dGQj3oOCnMVy", priceId: "price_1T6TzyE3DWgyVvjl4azbRORj" },
      { color: "Brick", size: "L", print: "w", qty: 1, productId: "prod_U4dGKWPV3KvK8b", priceId: "price_1T6TzzE3DWgyVvjlR85W3YiX" },
      // Washed Denim
      { color: "Washed Denim", size: "S", print: "d", qty: 4, productId: "prod_U4dGrV6jquBk8E", priceId: "price_1T6U00E3DWgyVvjlTPIIq14U" },
      { color: "Washed Denim", size: "M", print: "d", qty: 1, productId: "prod_U4dGW7sQAFdi2l", priceId: "price_1T6U02E3DWgyVvjlxhYTR7dn" },
      { color: "Washed Denim", size: "L", print: "d", qty: 1, productId: "prod_U4dGwS0QNpeMXJ", priceId: "price_1T6U03E3DWgyVvjlLqwD7AMe" },
      // Emerald
      { color: "Emerald", size: "S", print: "d", qty: 4, productId: "prod_U4dGjsT0c3f5so", priceId: "price_1T6U04E3DWgyVvjl7W2b51M1" },
      { color: "Emerald", size: "M", print: "d", qty: 1, productId: "prod_U4dGeaOSWu6okH", priceId: "price_1T6U06E3DWgyVvjl9ViT7rjb" },
      { color: "Emerald", size: "L", print: "d", qty: 1, productId: "prod_U4dGTX7MM4b1gl", priceId: "price_1T6U07E3DWgyVvjliCCE8Djp" },
    ];

    const PRICE_DISPLAY = '$45';
    const DISCOUNT_COLORS = new Set(['Washed Red', 'Washed Cocoa']);
    const DISCOUNT_PRICE_DISPLAY = '$35';

    // Image map: "Color|print" → filename
    const IMAGE_MAP = {
      'Washed Pine|d':  '../images/shop/washedPineDark.JPG',
      'Washed Pine|w':  '../images/shop/washedPineWhite.JPG',
      'Washed Red|d':   '../images/shop/washedRedDark.JPG',
      'Washed Red|w':   '../images/shop/washedRedWhite.JPG',
      'Washed Cocoa|w': '../images/shop/washedCocoaWhite.JPG',
      'Brick|w':        '../images/shop/brickWhite.JPG',
      'Washed Denim|d': '../images/shop/washedDenimDark.JPG',
      'Emerald|d':      '../images/shop/emeraldDark.JPG',
    };
    const DEFAULT_IMAGE = '../images/photo-12.jpg';

    const colorSelect = document.getElementById('color-select');
    const sizeButtons = document.getElementById('size-buttons');
    const printButtons = document.getElementById('print-buttons');
    const buyBtn = document.getElementById('buy-btn');
    const stockStatus = document.getElementById('stock-status');
    const productForm = document.getElementById('product-form');
    const productImage = document.getElementById('product-image');
    const PRINT_LABELS = { d: 'Dark', w: 'White' };
    const ALL_SIZES = ['S', 'M', 'L', 'XL', '2XL'];
    const allColors = [...new Set(VARIANTS.map(v => v.color))];
    let selectedSize = '';
    let selectedPrint = '';

    // Populate color dropdown
    allColors.forEach(color => {
      const opt = document.createElement('option');
      opt.value = color;
      opt.textContent = color;
      colorSelect.appendChild(opt);
    });

    colorSelect.addEventListener('change', () => {
      selectedSize = '';
      selectedPrint = '';
      updateImage();
      renderSizes();
      renderPrints();
      updateStatus();
      // Show/hide discount notice
      const notice = document.getElementById('discount-notice');
      const priceEl = document.querySelector('.product-price');
      if (DISCOUNT_COLORS.has(colorSelect.value)) {
        notice.style.display = 'block';
        priceEl.style.display = 'none';
      } else {
        notice.style.display = 'none';
        priceEl.style.display = '';
      }
    });

    function updateImage() {
      const color = colorSelect.value;
      if (color) {
        const key = `${color}|${selectedPrint}`;
        if (IMAGE_MAP[key]) { productImage.src = IMAGE_MAP[key]; return; }
        const fallback = Object.keys(IMAGE_MAP).find(k => k.startsWith(color + '|'));
        if (fallback) { productImage.src = IMAGE_MAP[fallback]; return; }
      }
      productImage.src = DEFAULT_IMAGE;
    }

    function renderSizes() {
      const color = colorSelect.value;
      sizeButtons.innerHTML = '';
      if (!color) return;
      const availableSizes = VARIANTS.filter(v => v.color === color);
      ALL_SIZES.forEach(size => {
        const variants = availableSizes.filter(v => v.size === size);
        const totalQty = variants.reduce((sum, v) => sum + v.qty, 0);
        if (variants.length === 0) return;
        const btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'opt-btn'; btn.textContent = size;
        if (totalQty === 0) {
          btn.classList.add('sold-out'); btn.disabled = true;
        } else {
          btn.addEventListener('click', () => {
            selectedSize = size;
            sizeButtons.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedPrint = '';
            renderPrints();
            updateStatus();
          });
        }
        if (selectedSize === size && totalQty > 0) btn.classList.add('active');
        sizeButtons.appendChild(btn);
      });
    }

    function renderPrints() {
      const color = colorSelect.value;
      printButtons.innerHTML = '';
      if (!color || !selectedSize) return;
      const prints = [...new Set(VARIANTS.filter(v => v.color === color && v.size === selectedSize).map(v => v.print))];
      prints.forEach(p => {
        const variant = VARIANTS.find(v => v.color === color && v.size === selectedSize && v.print === p);
        const btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'opt-btn'; btn.textContent = PRINT_LABELS[p] || p;
        if (!variant || variant.qty === 0) {
          btn.classList.add('sold-out'); btn.disabled = true;
        } else {
          btn.addEventListener('click', () => {
            selectedPrint = p;
            printButtons.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateImage();
            updateStatus();
          });
        }
        if (selectedPrint === p && variant && variant.qty > 0) btn.classList.add('active');
        printButtons.appendChild(btn);
      });
      // Auto-select if only one print option
      if (prints.length === 1) {
        const onlyVariant = VARIANTS.find(v => v.color === color && v.size === selectedSize && v.print === prints[0]);
        if (onlyVariant && onlyVariant.qty > 0) {
          selectedPrint = prints[0];
          printButtons.querySelector('.opt-btn').classList.add('active');
          updateImage();
          updateStatus();
        }
      }
    }

    function getSelectedVariant() {
      const color = colorSelect.value;
      if (!color || !selectedSize || !selectedPrint) return null;
      return VARIANTS.find(v => v.color === color && v.size === selectedSize && v.print === selectedPrint);
    }

    function updateStatus() {
      const variant = getSelectedVariant();
      const color = colorSelect.value;
      const isDiscounted = DISCOUNT_COLORS.has(color);
      const priceLabel = isDiscounted ? DISCOUNT_PRICE_DISPLAY : PRICE_DISPLAY;
      if (variant) {
        if (variant.qty > 0) {
          buyBtn.disabled = false;
          buyBtn.textContent = `Add to Cart — ${priceLabel}`;
          stockStatus.textContent = variant.qty <= 3 ? `Only ${variant.qty} left` : 'In Stock';
          stockStatus.className = 'stock-status' + (variant.qty <= 3 ? ' stock-low' : ' stock-ok');
        } else {
          buyBtn.disabled = true; buyBtn.textContent = 'Sold Out';
          stockStatus.textContent = 'Out of stock'; stockStatus.className = 'stock-status stock-out';
        }
      } else {
        buyBtn.disabled = true; buyBtn.textContent = 'Select Options Above';
        stockStatus.textContent = ''; stockStatus.className = 'stock-status';
      }
    }

    productForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const variant = getSelectedVariant();
      if (!variant) return;
      const color = colorSelect.value;
      const isDiscounted = DISCOUNT_COLORS.has(color);
      const key = `${color}|${selectedPrint}`;
      const image = IMAGE_MAP[key] || Object.values(IMAGE_MAP).find((v, i) => Object.keys(IMAGE_MAP)[i].startsWith(color + '|')) || DEFAULT_IMAGE;
      HI_CART.add({
        priceId: variant.priceId,
        productId: variant.productId,
        name: 'HI Classic Tee',
        color: color,
        size: variant.size,
        print: variant.print === 'd' ? 'Dark' : 'White',
        price: isDiscounted ? 35 : 45,
        qty: 1,
        image: image.replace('../', ''),
      });
      buyBtn.textContent = '✓ Added!';
      buyBtn.disabled = true;
      setTimeout(() => updateStatus(), 1500);
    });
  </script>
</body>
</html>
